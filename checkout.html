<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calmivo | إتمام الطلب</title>
    <!-- Modern Typography: Cairo & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/style.css" />
    <style>
      /* Page specific styles */
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background-color: var(--bg-dark);
        padding: 2rem 5%;
        margin: 0;
      }
      .checkout-container {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 3rem;
        width: 100%;
        max-width: 600px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        position: relative;
        z-index: 10;
      }
      .checkout-header {
        text-align: center;
        margin-bottom: 2rem;
      }
      .checkout-header h1 {
        font-size: 2.2rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
      }
      .checkout-header p {
        color: var(--text-muted);
        font-size: 1.1rem;
      }
      .form-group {
        margin-bottom: 1.5rem;
      }
      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        font-size: 1.1rem;
      }
      .form-control {
        width: 100%;
        padding: 1rem 1.2rem;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: white;
        font-family: 'Cairo', sans-serif;
        font-size: 1.1rem;
        transition: all 0.3s ease;
      }
      .form-control:focus {
        outline: none;
        border-color: rgba(var(--dynamic-color), 0.5);
        box-shadow: 0 0 15px rgba(var(--dynamic-color), 0.2);
      }
      .order-summary {
        background: rgba(0, 0, 0, 0.4);
        border-radius: 10px;
        padding: 1.5rem;
        margin-bottom: 2rem;
        border: 1px dashed rgba(255, 255, 255, 0.2);
      }
      .summary-item {
        display: flex;
        justify-content: space-between;
        margin-bottom: 0.5rem;
        font-size: 1.1rem;
      }
      .summary-total {
        display: flex;
        justify-content: space-between;
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        font-weight: 800;
        font-size: 1.4rem;
        color: rgb(var(--dynamic-color));
      }
      .submit-btn {
        width: 100%;
        padding: 1rem;
        font-size: 1.3rem;
        margin-top: 1rem;
      }
      .back-link {
        display: block;
        text-align: center;
        margin-top: 2rem;
        color: var(--text-muted);
        text-decoration: none;
        transition: color 0.3s ease;
      }
      .back-link:hover {
        color: white;
      }
      @media (max-width: 600px) {
        .checkout-container {
          padding: 2rem 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- Background -->
    <div class="animated-bg-container" style="position: fixed;">
      <div class="ambient-glow"></div>
      <div class="floating-orb orb-1"></div>
      <div class="floating-orb orb-2"></div>
      <div class="grid-floor"></div>
    </div>

    <div class="checkout-container">
      <div class="checkout-header">
        <h1>إتمام الطلب</h1>
        <p>الرجاء إدخال معلوماتك لتأكيد الطلب (الدفع عند الاستلام)</p>
      </div>

      <div class="order-summary" id="order-summary">
        <!-- Summary populated via JS -->
      </div>

      <form id="checkout-form">
        <div class="form-group">
          <label for="name">الاسم الكامل *</label>
          <input type="text" id="name" class="form-control" required placeholder="محمد أحمد" />
        </div>
        <div class="form-group">
          <label for="phone">رقم الهاتف *</label>
          <input type="tel" id="phone" class="form-control" required placeholder="06XXXXXXXX" dir="ltr" style="text-align: right;" />
        </div>
        <div class="form-group">
          <label for="city">المدينة *</label>
          <input type="text" id="city" class="form-control" required placeholder="الدار البيضاء، الرباط..." />
        </div>
        <button type="submit" class="btn-primary submit-btn">تأكيد الطلب الآن</button>
      </form>

      <a href="index.html" class="back-link">← العودة للصفحة الرئيسية</a>
    </div>

    <script>
      // Packages data
      const packages = {
        '1': { title: 'علبة واحدة (1x)', price: 219 },
        '2': { title: 'علبتين (2x)', price: 269 },
        '3': { title: 'ثلاث علب (3x)', price: 319 }
      };

      // Get parameter from URL
      const urlParams = new URLSearchParams(window.location.search);
      const pkgId = urlParams.get('package') || '1';
      const selectedPkg = packages[pkgId] || packages['1'];

      // Populate summary
      const summaryDiv = document.getElementById('order-summary');
      summaryDiv.innerHTML = `
        <div class="summary-item">
          <span>المنتج:</span>
          <strong>Calmivo - ${selectedPkg.title}</strong>
        </div>
        <div class="summary-item">
          <span>التوصيل:</span>
          <strong>مجانًا</strong>
        </div>
        <div class="summary-total">
          <span>المجموع:</span>
          <span>${selectedPkg.price}.00 درهم</span>
        </div>
      `;

      // Form submission directly to Google Sheets
      document.getElementById('checkout-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const submitBtn = this.querySelector('button');
        submitBtn.innerHTML = 'جاري التأكيد...';
        submitBtn.style.opacity = '0.7';
        submitBtn.disabled = true;
        
        // --- ضع رابط Google Apps Script الخاص بك هنا ---
        const GOOGLE_SHEET_URL = ''; 
        
        const formData = new URLSearchParams();
        formData.append('name', document.getElementById('name').value);
        formData.append('phone', document.getElementById('phone').value);
        formData.append('city', document.getElementById('city').value);
        formData.append('packageTitle', selectedPkg.title);
        formData.append('price', selectedPkg.price);

        if(GOOGLE_SHEET_URL && GOOGLE_SHEET_URL !== '') {
          try {
            await fetch(GOOGLE_SHEET_URL, {
              method: 'POST',
              body: formData,
              mode: 'no-cors'
            });
          } catch (error) {
            console.error('Error:', error);
          }
        }

        // Show success UI directly
        setTimeout(() => {
          summaryDiv.style.display = 'none';
          document.querySelector('.checkout-header p').style.display = 'none';
          document.querySelector('.checkout-header h1').innerHTML = 'تم تأكيد طلبك بنجاح! 🎉';
          this.innerHTML = '<div style="text-align:center; font-size:1.3rem; line-height:1.6; margin-top:20px;">سنتواصل معك قريباً لتأكيد التوصيل عبر الهاتف.<br><br><span style="color:var(--text-muted); font-size:1rem;">شكراً لاختيارك Calmivo</span></div>';
        }, 800);
      });
    </script>
  </body>
</html>
