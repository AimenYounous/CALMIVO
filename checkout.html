<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calmivo | إتمام الطلب</title>
  <!-- Modern Typography: Cairo & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;800&family=Outfit:wght@400;600;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./src/style.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--bg-dark);
      padding: 2rem 5%;
      margin: 0;
    }
    .checkout-wrapper {
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 15px;
      padding: 1.5rem;
      color: white;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      text-align: right;
      position: relative;
      z-index: 10;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 2rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.3s ease;
      position: relative;
      z-index: 10;
    }
    .back-link:hover {
      color: white;
    }
    @media (max-width: 500px) {
      .product-selection {
        gap: 6px;
      }
      .option-content {
        padding: 6px 8px !important;
      }
      .option-content img {
        width: 45px !important;
        height: 45px !important;
        margin-left: 10px !important;
      }
      .option-details h4 {
        font-size: 0.95rem !important;
      }
      .badge {
        padding: 1px 6px !important;
        font-size: 0.7rem !important;
        margin-top: 2px !important;
      }
    }
  </style>
</head>
<body>
  <!-- Background -->
  <div class="animated-bg-container" style="position: fixed;">
    <div class="ambient-glow"></div>
    <div class="floating-orb orb-1"></div>
    <div class="floating-orb orb-2"></div>
    <div class="grid-floor"></div>
  </div>

  <div class="checkout-wrapper">
    <div class="checkout-header-img" style="text-align: center; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem;">
      <h3 style="color: #a855f7; font-weight: 800; font-size: 1.2rem; line-height: 1.6; text-shadow: 0 0 10px rgba(168, 85, 247, 0.3);">
        🇲🇦 اطلب بالأسفل مع الدفع عند الاستلام <br> + توصيل مجاني 🇲🇦
      </h3>
    </div>

    <div class="product-selection">
      <!-- Option 1 -->
      <label class="product-option selected">
        <input type="radio" name="package" value="1" checked style="display: none;">
        <div class="option-content">
          <img src="./ONECAL.png" alt="1x Calmivo">
          <div class="option-details">
            <h4>1x Calmivo Classic | لشهر واحد</h4>
            <div class="option-price-mobile">219.00 dh</div>
          </div>
          <div class="option-price">
            <span class="price">219.00 dh</span>
          </div>
        </div>
      </label>

      <!-- Option 2 -->
      <label class="product-option">
        <input type="radio" name="package" value="2" style="display: none;">
        <div class="option-content">
          <img src="./TWOCAL.png" alt="2x Calmivo">
          <div class="option-details">
            <h4>2x Calmivo Classic | لشهرين</h4>
            <span class="badge" style="background: #9333ea; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; margin-top: 5px; display: inline-block;">توفير 35%</span>
            <div class="option-price-mobile">
                <span class="old-price" style="text-decoration: line-through; color: #999; font-size: 0.9rem; margin-left: 5px;">350.00 dh</span>
                269.00 dh
            </div>
          </div>
          <div class="option-price">
            <span class="old-price" style="text-decoration: line-through; color: #999; font-size: 0.9rem; display: block;">350.00 dh</span>
            <span class="price">269.00 dh</span>
          </div>
        </div>
      </label>

      <!-- Option 3 -->
      <label class="product-option">
        <input type="radio" name="package" value="3" style="display: none;">
        <div class="option-content">
          <img src="./THREECAL.png" alt="3x Calmivo">
          <div class="option-details">
            <h4>3x Calmivo Classic | لثلاثة أشهر</h4>
            <span class="badge" style="background: #9333ea; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; margin-top: 5px; display: inline-block;">الأكثر طلباً</span>
            <div class="option-price-mobile">
                <span class="old-price" style="text-decoration: line-through; color: #999; font-size: 0.9rem; margin-left: 5px;">450.00 dh</span>
                319.00 dh
            </div>
          </div>
          <div class="option-price">
            <span class="old-price" style="text-decoration: line-through; color: #999; font-size: 0.9rem; display: block;">450.00 dh</span>
            <span class="price">319.00 dh</span>
          </div>
        </div>
      </label>
    </div>

    <form id="checkout-form-main" class="checkout-form-inline" style="margin-top: 2rem;">
      <div class="form-group" style="margin-bottom: 1rem;">
        <label style="display: block; font-weight: bold; margin-bottom: 0.5rem; color: white;">الإسم الكامل <span style="color: #ef4444;">*</span></label>
        <div style="display: flex; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; background: rgba(0,0,0,0.3);">
          <span style="background: rgba(255,255,255,0.05); padding: 10px 15px; color: #aaa; border-left: 1px solid rgba(255,255,255,0.1);">👤</span>
          <input type="text" id="name" required placeholder="Nom et prénom" style="flex: 1; border: none; padding: 10px; outline: none; background: transparent; color: white; font-family: 'Cairo', sans-serif;">
        </div>
      </div>

      <div class="form-group" style="margin-bottom: 1rem;">
        <label style="display: block; font-weight: bold; margin-bottom: 0.5rem; color: white;">رقم الهاتف <span style="color: #ef4444;">*</span></label>
        <div style="display: flex; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; background: rgba(0,0,0,0.3);">
          <span style="background: rgba(255,255,255,0.05); padding: 10px 15px; color: #aaa; border-left: 1px solid rgba(255,255,255,0.1);">📞</span>
          <input type="tel" id="phone" required placeholder="Numéro de téléphone" dir="ltr" style="flex: 1; border: none; padding: 10px; outline: none; text-align: right; background: transparent; color: white; font-family: 'Cairo', sans-serif;">
        </div>
      </div>

      <div class="form-group" style="margin-bottom: 1.5rem;">
        <label style="display: block; font-weight: bold; margin-bottom: 0.5rem; color: white;">المدينة <span style="color: #ef4444;">*</span></label>
        <div style="display: flex; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; overflow: hidden; background: rgba(0,0,0,0.3);">
          <span style="background: rgba(255,255,255,0.05); padding: 10px 15px; color: #aaa; border-left: 1px solid rgba(255,255,255,0.1);">📍</span>
          <input type="text" id="city" required placeholder="Ville" style="flex: 1; border: none; padding: 10px; outline: none; background: transparent; color: white; font-family: 'Cairo', sans-serif;">
        </div>
      </div>

      <button type="submit" id="submit-order-btn" class="btn-primary" style="width: 100%; padding: 1rem; font-size: 1.3rem; background-color: #9333ea; color: white; border: none; border-radius: 8px; font-weight: bold; box-shadow: 0 4px 15px rgba(147, 51, 234, 0.4); transition: all 0.3s ease; cursor: pointer; font-family: 'Cairo', sans-serif;">تأكيد الطلب الآن</button>
      
      <div id="success-msg" style="display: none; text-align: center; color: #a855f7; font-weight: bold; margin-top: 1rem; font-size: 1.2rem; text-shadow: 0 0 10px rgba(168, 85, 247, 0.3);">
        تم تأكيد طلبك بنجاح! 🎉<br>سنتواصل معك قريباً.
      </div>
    </form>
  </div>

  <a href="index.html" class="back-link">← العودة للصفحة الرئيسية</a>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    // Handle Radio Option Selection
    const productOptions = document.querySelectorAll('.product-option');
    productOptions.forEach(option => {
      option.addEventListener('click', function() {
        // Remove selected class from all options
        productOptions.forEach(opt => opt.classList.remove('selected'));
        
        // Add selected class to the clicked option
        this.classList.add('selected');
        
        // Ensure the radio input is checked (useful if clicked on the div)
        const radio = this.querySelector('input[type="radio"]');
        if (radio) {
          radio.checked = true;
        }
      });
    });

    // Handle Checkout Form Submission
    const checkoutForm = document.getElementById('checkout-form-main');
    if (checkoutForm) {
      checkoutForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submit-order-btn');
        submitBtn.innerHTML = 'جاري التأكيد...';
        submitBtn.style.opacity = '0.7';
        submitBtn.disabled = true;

        // Google Apps Script URL
        const GOOGLE_SHEET_URL = 'https://script.google.com/macros/s/AKfycbzF17cN-7ldKjByY-TCdYhGX-g8vki5l5_J5lPJRtxSIOfoTJsIDk8Dbghk7qGDGHk/exec';

        const pkgId = document.querySelector('input[name="package"]:checked').value;
        const prices = {
          '1': 219,
          '2': 269,
          '3': 319
        };

        const formData = new URLSearchParams();
        formData.append('date_order', new Date().toLocaleString('fr-FR'));
        formData.append('full_name', document.getElementById('name').value);
        formData.append('phone', document.getElementById('phone').value);
        formData.append('address', document.getElementById('city').value);
        formData.append('sku', 'nerve-calm30');
        formData.append('qte', pkgId);
        formData.append('price', prices[pkgId] || prices['1']);

        if (GOOGLE_SHEET_URL && GOOGLE_SHEET_URL !== '') {
          try {
            await fetch(GOOGLE_SHEET_URL, {
              method: 'POST',
              body: formData,
              mode: 'no-cors'
            });
          } catch (error) {
            console.error('Error:', error);
          }
        }

        // Show success UI directly
        setTimeout(() => {
          document.querySelector('.product-selection').style.display = 'none';
          document.querySelector('.checkout-header-img').style.display = 'none';
          
          // Hide inputs but keep the container
          const formGroups = checkoutForm.querySelectorAll('.form-group');
          formGroups.forEach(group => group.style.display = 'none');
          
          submitBtn.style.display = 'none';
          
          const successMsg = document.getElementById('success-msg');
          successMsg.style.display = 'block';
          
          if (window.gsap) {
            gsap.from(successMsg, {
              scale: 0.8,
              opacity: 0,
              duration: 0.5,
              ease: 'back.out(1.7)'
            });
          }
        }, 800);
      });
    }
  </script>
</body>
</html>
